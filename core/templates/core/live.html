{% extends 'core/base.html' %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom border-secondary">
    <h1 class="h2 text-info"><i class="fas fa-satellite-dish me-3"></i>REAL-TIME SURVEILLANCE</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <span class="badge bg-danger pulse-animation me-2 px-3 py-2" id="alert-status">LIVE FEED ACTIVE</span>
    </div>
</div>

<div class="row g-4">
    <div class="col-lg-9">
        <div class="glass-panel overflow-hidden">
            <div class="p-3 d-flex justify-content-between align-items-center border-bottom border-secondary">
                <span class="text-uppercase fw-bold opacity-75">Neural Stream 01</span>
                <div>
                    <label for="videoUpload" class="btn btn-outline-info btn-sm mb-0 me-2">
                        <i class="fas fa-cloud-upload-alt me-1"></i> UPLOAD DATA
                    </label>
                    <input type="file" id="videoUpload" accept="video/mp4" style="display: none;">
                    <button id="startBtn" class="btn btn-success btn-sm"><i class="fas fa-play me-1"></i> RESUME</button>
                    <button id="stopBtn" class="btn btn-danger btn-sm"><i class="fas fa-stop me-1"></i> HALT</button>
                </div>
            </div>
            <div class="p-0 text-center bg-black">
                <img id="videoFeed" src="{% url 'video_feed' %}" class="img-fluid" style="width: 100%; max-height: 600px; object-fit: contain;">
            </div>
        </div>
    </div>
    <div class="col-lg-3">
        <div class="glass-panel p-3 h-100">
            <h6 class="text-uppercase fw-bold mb-4 opacity-75"><i class="fas fa-bell me-2"></i>AI EVENT LOG</h6>
            <div id="alert-container" class="small overflow-auto" style="max-height: 500px;">
                <p class="text-muted italic">Monitoring road surface for anomalies...</p>
            </div>
        </div>
    </div>
</div>

<style>
    .pulse-animation {
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    const videoFeed = document.getElementById('videoFeed');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const alertStatus = document.getElementById('alert-status');

    stopBtn.addEventListener('click', () => {
        videoFeed.src = "";
        alertStatus.classList.remove('bg-danger');
        alertStatus.classList.add('bg-secondary');
        alertStatus.innerText = "STOPPED";
        alertStatus.classList.remove('pulse-animation');
    });

    startBtn.addEventListener('click', () => {
        videoFeed.src = "{% url 'video_feed' %}";
        alertStatus.classList.remove('bg-secondary');
        alertStatus.classList.add('bg-danger');
        alertStatus.innerText = "LIVE";
        alertStatus.classList.add('pulse-animation');
    });

    const videoUpload = document.getElementById('videoUpload');

    videoUpload.addEventListener('change', () => {
        const file = videoUpload.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('video_file', file);
        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

        alertStatus.innerText = "UPLOADING...";
        
        fetch("{% url 'video_upload' %}", {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                alertStatus.innerText = "UPLOADED";
                setTimeout(() => {
                    alertStatus.innerText = "LIVE FEED ACTIVE";
                    const ts = new Date().getTime();
                    videoFeed.src = "{% url 'video_feed' %}?t=" + ts;
                }, 2000);
            } else {
                alert("Upload failed: " + data.message);
                alertStatus.innerText = "ERROR";
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("An error occurred during upload.");
        });
    });
</script>
{% endblock %}
